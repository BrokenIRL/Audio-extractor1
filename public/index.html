<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Audio Extractor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: #1e293b; padding: 40px; border-radius: 16px; width: 100%; max-width: 500px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3); text-align: center; }
        h1 { font-size: 24px; margin-bottom: 8px; color: #38bdf8; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 30px; }
        .dropzone { border: 2px dashed #475569; padding: 30px; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-bottom: 20px; display: block; }
        .dropzone:hover { border-color: #38bdf8; background: #334155; }
        input[type="file"] { display: none; }
        button { width: 100%; background: #0284c7; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 600; font-size: 16px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0369a1; }
        button:disabled { background: #475569; cursor: not-allowed; }
        #status { margin-top: 20px; font-size: 14px; color: #38bdf8; min-height: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h1>Pankaj Verma Audio Extractor</h1>
    <p>Upload any video file to extract audio as it's a website it may takes some times. Please kindly wait.</p>
    
    <form id="converterForm">
        <label class="dropzone" id="dropzoneLabel">
            <span id="fileLabel">Click to select video</span>
            <input type="file" id="videoFile" accept="video/*" required>
        </label>
        <button type="submit" id="btn">Extract MP3 Audio</button>
    </form>

    <div id="status"></div>
</div>

<script>
    const fileInput = document.getElementById('videoFile');
    const fileLabel = document.getElementById('fileLabel');
    const form = document.getElementById('converterForm');
    const statusDiv = document.getElementById('status');
    const submitBtn = document.getElementById('btn');

    fileInput.addEventListener('change', () => {
        if (fileInput.files.length > 0) {
            fileLabel.textContent = fileInput.files[0].name;
        }
    });

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const formData = new FormData();
        formData.append('video', fileInput.files[0]);

        statusDiv.textContent = "Processing... Your video is converting to audio.";
        submitBtn.disabled = true;

        try {
            const response = await fetch('/api/extract', {
                method: 'POST',
                body: formData
            });

            if (!response.ok) throw new Error('Conversion failed.');

            const blob = await response.blob();
            const downloadUrl = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = downloadUrl;
            link.download = "extracted_audio.mp3";
            document.body.appendChild(link);
            link.click();
            link.remove();

            statusDiv.textContent = "Success! Your download has started.";
        } catch (err) {
            statusDiv.textContent = "Error: Could not convert video.";
            console.error(err);
        } finally {
            submitBtn.disabled = false;
        }
    });
</script>

</body>
              </html>
